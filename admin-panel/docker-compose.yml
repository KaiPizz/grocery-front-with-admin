services:
  admin-panel:
    build:
      context: .
      args:
        NEXT_PUBLIC_SALON_SLUG: ${NEXT_PUBLIC_SALON_SLUG}
    ports:
      - '127.0.0.1:4100:4100'
    environment:
      - HOSTNAME=0.0.0.0
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - ADMIN_ALLOWED_SLUGS=${ADMIN_ALLOWED_SLUGS}
      - ADMIN_DATA_DIR=/app/shared/data
      - ADMIN_AUTH_DIR=/app/shared/auth
      - ADMIN_UPLOAD_DIR=/app/shared/public/uploads
      - ADMIN_PUBLIC_ORIGIN=${ADMIN_PUBLIC_ORIGIN}
      - NEXT_PUBLIC_SALON_SLUG=${NEXT_PUBLIC_SALON_SLUG}
      - STOREFRONT_ORIGINS=${STOREFRONT_ORIGINS}
    volumes:
      - admin-shared:/app/shared

volumes:
  admin-shared:
