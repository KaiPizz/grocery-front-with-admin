  const q = search.trim().toLowerCase();

    if (filter === 'undecided' && rowDecision(row)) return false;
    if (filter !== 'all' && filter !== 'undecided' && row.bucket !== filter) return false;
    if (!q) return true;
    const hay = [row.image_files, row.visible_product, row.candidate_sku, row.candidate_product, row.agent_notes, row.source_report].join(' ').toLowerCase();
    return hay.includes(q);
  });
}
function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function bucketLabel(bucket) {
  return bucket === 'review_high_existing_sku' ? 'Strong match' : 'Needs confirmation';
}
function decisionLabel(decision) {
  return ({ approve: 'Same', reject: 'Wrong', create_new: 'Create new', skip: 'Skip' })[decision] || 'Open';
}
function updateStats() {
  const total = rows.length;
  const done = rows.filter(row => rowDecision(row)).length;
  const strong = rows.filter(row => row.bucket === 'review_high_existing_sku').length;
  const ambiguous = rows.filter(row => row.bucket === 'needs_owner_confirmation').length;
  const counts = { approve: 0, reject: 0, create_new: 0, skip: 0 };
  rows.forEach(row => { const d = rowDecision(row); if (d) counts[d] = (counts[d] || 0) + 1; });
  document.getElementById('stats').innerHTML = `
    <span class="pill">${done}/${total} reviewed</span>
    <span class="pill">Strong: ${strong}</span>
    <span class="pill">Needs confirm: ${ambiguous}</span>
    <span class="pill">Same: ${counts.approve}</span>
    <span class="pill">Wrong: ${counts.reject}</span>
    <span class="pill">Create: ${counts.create_new}</span>
    <span class="pill">Skip: ${counts.skip}</span>`;
}
function renderList() {
  const list = filteredRows();
  const el = document.getElementById('rowList');
  if (!list.length) { el.innerHTML = '<div class="empty">No rows</div>'; return; }
  if (!list.some(row => row.id === currentId)) currentId = list[0].id;
  el.innerHTML = list.map(row => {
    const d = rowDecision(row);
    return `<button class="row-btn ${row.id === currentId ? 'active' : ''}" data-row-id="${esc(row.id)}">
      <span class="row-index">${row.index}</span>
      <span class="row-main"><span class="row-title">${esc(row.visible_product)}</span><span class="row-meta">${esc(row.candidate_sku || 'no SKU')} · ${esc(row.image_files)}</span></span>
      <span class="decision-dot ${esc(d)}" title="${esc(decisionLabel(d))}"></span>
    </button>`;
  }).join('');
  el.querySelectorAll('[data-row-id]').forEach(btn => btn.addEventListener('click', () => { currentId = btn.dataset.rowId; render(); }));
}
function renderCard() {
  const row = rows.find(r => r.id === currentId) || filteredRows()[0];
  const el = document.getElementById('card');
  if (!row) { el.innerHTML = '<div class="empty">No row selected</div>'; return; }
  const d = rowDecision(row);
  const thumbHtml = row.thumbs.length ? row.thumbs.map(t => `<div class="thumb"><img src="${esc(t.src)}" alt="${esc(t.file)}"><div class="thumb-name">${esc(t.file)}</div></div>`).join('') : '<div class="empty">Missing thumbnail</div>';
  const linkHtml = row.candidate_links.length ? row.candidate_links.map(link => `<div class="candidate-link">
      <div><strong>${esc(link.sku)}</strong></div>
      <div>${esc(link.name_pl || row.candidate_product)}</div>
      ${link.url ? `<a href="${esc(link.url)}" target="_blank" rel="noreferrer">Open product page ↗</a>` : ''}
    </div>`).join('') : '<div class="notes">No candidate product link. Usually this means create new / identify manually.</div>';
  el.innerHTML = `
    <div class="card-head">
      <div>
        <h2 class="card-title">${row.index}. ${esc(row.visible_product)}</h2>
        <div class="tagline">
          <span class="tag ${row.bucket === 'review_high_existing_sku' ? 'high' : 'warn'}">${bucketLabel(row.bucket)}</span>
          <span class="tag">${esc(row.candidate_action)}</span>
          <span class="tag">${esc(row.confidence)}</span>
          <span class="tag">${esc(row.source_report)}</span>
        </div>
      </div>
      <div class="pill">Decision: ${esc(decisionLabel(d))}</div>
    </div>
    <div class="split">
      <div class="images"><div class="image-grid">${thumbHtml}</div></div>
      <div class="details">
        <div class="section"><div class="label">Candidate SKU / product link</div><div class="candidate">${linkHtml}</div></div>
        <div class="section"><div class="label">Candidate product text</div><div class="value">${esc(row.candidate_product || 'No exact candidate')}</div></div>
        <div class="section"><div class="label">Agent notes</div><div class="notes">${esc(row.agent_notes || '')}</div></div>
        <div class="section"><div class="label">Owner notes</div><textarea class="textarea" id="ownerNotes" placeholder="Optional: correct product, size, variant, SKU, launch note...">${esc(rowNotes(row))}</textarea></div>
      </div>
    </div>
    <div class="decision-bar">
      <button data-decision="approve" class="${d === 'approve' ? 'selected' : ''}">1 · Same</button>
      <button data-decision="reject" class="${d === 'reject' ? 'selected' : ''}">2 · Wrong</button>
      <button data-decision="create_new" class="${d === 'create_new' ? 'selected' : ''}">3 · Create new</button>
      <button data-decision="skip" class="${d === 'skip' ? 'selected' : ''}">4 · Skip</button>
    </div>`;
  el.querySelectorAll('[data-decision]').forEach(btn => btn.addEventListener('click', () => setDecision(row.id, btn.dataset.decision)));
  const notes = el.querySelector('#ownerNotes');
  notes.addEventListener('input', () => { decisions[row.id] = { ...(decisions[row.id] || {}), notes: notes.value }; saveState(); });
}
function setDecision(id, decision) {
  decisions[id] = { ...(decisions[id] || {}), decision };
  saveState();
  move(1);
}
function move(delta) {
  const list = filteredRows();
  const idx = Math.max(0, list.findIndex(row => row.id === currentId));
  const next = list[Math.min(list.length - 1, Math.max(0, idx + delta))];
  if (next) currentId = next.id;
  render();
}
function render() { updateStats(); renderList(); renderCard(); }
function exportCsv() {
  const headers = ['id','bucket','image_files','visible_product','candidate_action','candidate_sku','candidate_product','decision','owner_notes','agent_notes','product_links'];
  const lines = [headers.join(',')];
  for (const row of rows) {
    const state = decisions[row.id] || {};
    const links = (row.candidate_links || []).map(l => l.url).filter(Boolean).join(' | ');
    const values = [row.id,row.bucket,row.image_files,row.visible_product,row.candidate_action,row.candidate_sku,row.candidate_product,state.decision || '',state.notes || '',row.agent_notes,links];
    lines.push(values.map(v => '"' + String(v ?? '').replace(/"/g, '""') + '"').join(','));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'asiandeligo-folder01-owner-decisions.csv';
  a.click();
  URL.revokeObjectURL(url);
}
document.querySelectorAll('[data-filter]').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filter = btn.dataset.filter;
  render();
}));
document.getElementById('search').addEventListener('input', event => { search = event.target.value; render(); });
document.getElementById('prevBtn').addEventListener('click', () => move(-1));
document.getElementById('nextBtn').addEventListener('click', () => move(1));
document.getElementById('exportBtn').addEventListener('click', exportCsv);
document.addEventListener('keydown', event => {
  if (event.target && ['TEXTAREA','INPUT'].includes(event.target.tagName)) return;
  if (event.key === 'ArrowRight') move(1);
  if (event.key === 'ArrowLeft') move(-1);
  if (event.key === '1') setDecision(currentId, 'approve');
  if (event.key === '2') setDecision(currentId, 'reject');
  if (event.key === '3') setDecision(currentId, 'create_new');
  if (event.key === '4') setDecision(currentId, 'skip');
});
render();
</script>
</body>
</html>
